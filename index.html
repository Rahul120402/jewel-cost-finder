<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewel Cost Finder Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Modern UI Styling */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            display: flex; justify-content: center; min-height: 100vh; padding: 20px;
        }
        .main-layout { display: flex; gap: 20px; width: 100%; max-width: 1100px; flex-wrap: wrap; }
        .container {
            background: #fff; flex: 2; min-width: 320px; padding: 25px;
            border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .history-panel {
            background: rgba(255,255,255,0.9); flex: 1; min-width: 280px;
            padding: 20px; border-radius: 20px; height: fit-content;
        }

        /* Scanner Box */
        #scanner-container { display: none; margin-bottom: 20px; border-radius: 15px; overflow: hidden; border: 3px solid #1f4037; position: relative; }
        #reader { width: 100%; background: #000; }
        #scan-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(46, 204, 113, 0.6); display: none; z-index: 10;
            justify-content: center; align-items: center; color: white; font-weight: bold;
        }

        /* Buttons & Inputs */
        .btn { padding: 14px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 10px; transition: 0.2s; }
        .scan-btn { background: #ff512f; color: white; }
        .search-btn { background: #1f4037; color: white; }
        .clear-btn { background: #eee; color: #333; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 16px; }

        /* Results */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .summary-row { background: #eef6f3; font-weight: bold; color: #1f4037; }
        .chart-box { margin-top: 30px; height: 300px; display: none; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="container">
        <h1>Jewel Cost Finder</h1>

        <button class="btn scan-btn" id="camBtn" onclick="toggleScanner()">📷 Open Barcode Scanner</button>
        
        <div id="scanner-container">
            <div id="scan-flash">COPIED!</div>
            <div id="reader"></div>
            <div style="background: #fff; padding: 10px; text-align: center;">
                <select id="camList" style="padding: 5px; margin-bottom: 5px; width: 80%;" onchange="restartWithCam(this.value)"></select>
                <button class="btn clear-btn" style="margin:0; width: auto;" onclick="toggleScanner()">Close</button>
            </div>
        </div>

        <input type="text" id="jewelCode" placeholder="Enter or Scan Codes (comma separated)">
        
        <div style="display:flex; gap:10px;">
            <button class="btn search-btn" onclick="fetchPrices()">Search & Analyze</button>
            <button class="btn clear-btn" onclick="resetAll()">Clear</button>
        </div>

        <div id="table-result"></div>
        <div id="chart-result" class="chart-box"><canvas id="myChart"></canvas></div>
    </div>

    <div class="history-panel">
        <h3>Recent Searches</h3>
        <div id="histList" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
    let scanner = null;
    let priceChart = null;
    let isPaused = false;
    const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

    // --- SCANNER LOGIC ---
    async function toggleScanner() {
        const container = document.getElementById("scanner-container");
        if (scanner) {
            await scanner.stop();
            scanner = null;
            container.style.display = "none";
            document.getElementById("camBtn").innerText = "📷 Open Barcode Scanner";
        } else {
            container.style.display = "block";
            document.getElementById("camBtn").innerText = "🛑 Stop Scanner";
            startCamera();
        }
    }

    async function startCamera() {
        try {
            const devices = await Html5Qrcode.getCameras();
            const select = document.getElementById("camList");
            select.innerHTML = devices.map(d => `<option value="${d.id}">${d.label}</option>`).join("");
            
            // Default to back camera on mobile
            const bestCam = devices.find(d => d.label.toLowerCase().includes('back')) || devices[0];
            select.value = bestCam.id;
            runScanner(bestCam.id);
        } catch (e) { alert("Camera Error: Check HTTPS/Permissions"); }
    }

    function runScanner(id) {
        if(scanner) scanner.stop();
        scanner = new Html5Qrcode("reader");
        scanner.start(id, { fps: 10, qrbox: {width: 250, height: 150} }, (text) => {
            if (isPaused) return;
            
            // Feedback
            isPaused = true;
            beep.play();
            document.getElementById("scan-flash").style.display = "flex";
            
            // Add to input
            const box = document.getElementById("jewelCode");
            let items = box.value.split(",").map(i => i.trim()).filter(i => i !== "");
            if(!items.includes(text)) {
                items.push(text);
                box.value = items.join(", ");
            }

            // Cooldown for 2 seconds
            setTimeout(() => {
                isPaused = false;
                document.getElementById("scan-flash").style.display = "none";
            }, 2000);
        });
    }

    function restartWithCam(id) { runScanner(id); }

    // --- DATA LOGIC ---
    async function fetchPrices() {
        const val = document.getElementById("jewelCode").value;
        if (!val) return;
        const codes = [...new Set(val.split(",").map(c => c.trim()).filter(c => c !== ""))];
        
        document.getElementById("table-result").innerHTML = "<p style='padding:20px; text-align:center;'>Searching...</p>";

        const results = await Promise.all(codes.map(c => 
            fetch(`https://script.google.com/macros/s/AKfycbwiXUnfpNL6gbRwKwsF-ONTkP2V4YzpZSgBxRUTwmOde3wYvo1Cmh5rlhN7thbXsAXEig/exec?code=${encodeURIComponent(c)}`)
            .then(r => r.json())
            .then(data => ({ code: c, cost: data.cost }))
            .catch(() => ({ code: c, cost: "Error" }))
        ));

        renderOutput(results);
    }

    function renderOutput(data) {
        let total = 0;
        let table = `<table><tr><th>Jewel Code</th><th>Price</th></tr>`;
        
        data.forEach(item => {
            const price = parseFloat(item.cost) || 0;
            total += price;
            table += `<tr><td><strong>${item.code}</strong></td><td>${price > 0 ? '₹ '+price.toLocaleString('en-IN') : item.cost}</td></tr>`;
        });
        
        table += `<tr class="summary-row"><td>TOTAL</td><td>₹ ${total.toLocaleString('en-IN')}</td></tr></table>`;
        document.getElementById("table-result").innerHTML = table;

        // Update Chart
        const valid = data.filter(d => !isNaN(parseFloat(d.cost)));
        if (valid.length > 0) {
            document.getElementById("chart-result").style.display = "block";
            if (priceChart) priceChart.destroy();
            priceChart = new Chart(document.getElementById("myChart"), {
                type: 'bar',
                data: {
                    labels: valid.map(v => v.code),
                    datasets: [{ label: 'Price (₹)', data: valid.map(v => v.cost), backgroundColor: '#1f4037' }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    }

    function resetAll() {
        document.getElementById("jewelCode").value = "";
        document.getElementById("table-result").innerHTML = "";
        document.getElementById("chart-result").style.display = "none";
        if(priceChart) priceChart.destroy();
    }
</script>

</body>
</html>
